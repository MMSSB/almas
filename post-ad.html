<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Property | Almas Developments</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo">
                <img src="images/almas.png" class="logo-almas" alt="">
                <span>ALMAS</span>
            </a>
            <nav class="nav-menu">
                <a href="index.html" class="btn btn-outline">Back to Home</a>
            </nav>
        </div>
    </header>

    <div class="container section-padding" style="max-width: 800px; margin-top: 40px;">
        <div class="settings-section">
            <div class="section-head">
                <h2>Post a Property</h2>
                <p>Fill in the details below to list your property on the marketplace.</p>
            </div>

            <form id="postAdForm">
                <div class="input-group form-full">
                    <label class="input-label">Property Image</label>
                    <div class="image-upload-box" id="uploadBox">
                        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 2rem; color: var(--primary); margin-bottom: 10px;"></i>
                        <p>Click to upload a high-quality photo</p>
                        <input type="file" id="propertyImage" accept="image/*" required style="display: none;">
                    </div>
                    <div id="imagePreviewContainer" style="display: none; margin-top: 15px;">
                        <img id="imagePreview" src="" alt="Preview" style="max-width: 100%; border-radius: 12px; height: 300px; object-fit: cover;">
                        <button type="button" class="btn-link delete" id="removeImage" style="margin-top: 10px; display: block;">Remove Image</button>
                    </div>
                </div>

                <div class="form-grid">
                    <div class="input-group form-full">
                        <label class="input-label">Property Title</label>
                        <input type="text" id="propTitle" class="custom-input" placeholder="e.g. Luxury Villa in Sheikh Zayed" required>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Transaction Type</label>
                        <select id="propType" class="custom-input" required>
                            <option value="Sale">For Sale</option>
                            <option value="Rent">For Rent</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Price (EGP)</label>
                        <input type="number" id="propPrice" class="custom-input" placeholder="e.g. 5000000" required>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Location</label>
                        <input type="text" id="propLocation" class="custom-input" placeholder="e.g. October City" required>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Bedrooms</label>
                        <input type="number" id="propBeds" class="custom-input" placeholder="3" required>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Bathrooms</label>
                        <input type="number" id="propBaths" class="custom-input" placeholder="2" required>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Area (m²)</label>
                        <input type="number" id="propArea" class="custom-input" placeholder="150" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" id="submitBtn" style="width: 100%; margin-top: 20px; font-size: 1.1rem; padding: 15px;">
                    Publish Listing
                </button>
            </form>
        </div>
    </div>


    <script type="module" src="postad.js"></script>
</body>
</html>
