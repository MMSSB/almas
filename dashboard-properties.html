<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Properties Catalog | ALMAS Dashboard</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="dashboard.css">

    <style>
        .prop-card { display: flex; flex-direction: column; height: 100%; border: 1px solid var(--border); border-radius: 20px; overflow: hidden; background: white; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .prop-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(14, 165, 233, 0.1); border-color: var(--primary-light); }
        .prop-card img { width: 100%; height: 220px; object-fit: cover; background: #f1f5f9; }
        .prop-card-body { padding: 20px; display: flex; flex-direction: column; flex: 1; }
        .prop-badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; }
        .badge-sale { background: #e0f2fe; color: var(--primary-dark); }
        .badge-rent { background: #dcfce7; color: #059669; }
        .prop-title { font-size: 1.1rem; font-weight: 800; color: var(--text-dark); margin-bottom: 5px; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .prop-price { font-size: 1.4rem; font-weight: 800; color: var(--primary); margin: 10px 0; }
        .prop-card-actions { margin-top: auto; display: flex; gap: 10px; border-top: 1px solid var(--border); padding-top: 15px; }
        .btn-small { flex: 1; padding: 10px; border-radius: 10px; font-weight: 700; font-size: 0.9rem; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        /* Drive Gallery Modal Styles */
        .drive-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); z-index: 9999; align-items: center; justify-content: center; }
        .drive-modal.active { display: flex; }
        .drive-modal-content { background: white; width: 90%; max-width: 800px; height: 80vh; border-radius: 20px; display: flex; flex-direction: column; overflow: hidden; }
        .drive-modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .drive-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 20px; overflow-y: auto; flex: 1; background: #f8fafc; }
        .drive-img-item { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 3px solid transparent; transition: 0.2s; background: #e2e8f0; }
        .drive-img-item:hover { border-color: var(--primary); transform: scale(1.02); }
    </style>
</head>
<body>
    <div id="almas-loader" class="almas-loader-overlay">
        <div class="loader-content">
            <div class="spinner-ring"></div>
            <img src="images/almas.png" alt="ALMAS Logo" class="loader-logo">
        </div>
        <h3 class="loader-text">Loading Posts...</h3>
    </div>
    <div class="toast-container" id="toastContainer"></div>

    <div class="drive-modal" id="driveModal">
        <div class="drive-modal-content">
            <div class="drive-modal-header">
                <h3><i class="fa-brands fa-google-drive" style="color: #0F9D58;"></i> Select Image from Drive</h3>
                <button id="closeDriveModal" class="btn btn-outline" style="padding: 5px 10px;"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="drive-grid" id="driveGrid">
                <p style="grid-column: 1/-1; text-align: center;"><i class="fa-solid fa-spinner fa-spin"></i> Loading images from Drive...</p>
            </div>
        </div>
    </div>

    <aside class="sidebar">
        <div class="logo-area"><div><img src="images/almas.png" alt="Logo"> ALMAS</div></div>
        <div class="admin-profile">
            <i class="fa-solid fa-shield-halved" id="roleIcon"></i>
            <h4 id="dashUserName">Loading...</h4>
            <p id="dashUserRole">Company Portal</p>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-btn"><i class="fa-solid fa-chart-pie"></i> Overview</a>
            <a href="dashboard-properties.html" class="nav-btn active"><i class="fa-solid fa-building"></i> Catalog & Ads</a>
            <a href="dashboard-messages.html" class="nav-btn"><i class="fa-solid fa-envelope"></i> Customer Inbox</a>
            <a href="dashboard-users.html" class="nav-btn"><i class="fa-solid fa-users"></i> Manage Users</a>
            <a href="dashboard-team.html" class="nav-btn" id="navTeamBtn" style="display: none;"><i class="fa-solid fa-user-shield"></i> Manage Team</a>
        </div>
        <button class="logout-btn" id="dashLogoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</button>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h2 class="page-title">Company Catalog</h2>
            <button id="toggleFormBtn" class="btn btn-primary"><i class="fa-solid fa-plus"></i> Add New Listing</button>
        </header>

        <div class="content-body">
            <div class="glass-card" id="propertyFormCard" style="display: none;">
                <div class="edit-mode-banner" id="editModeBanner">
                    <span><i class="fa-solid fa-pen-nib"></i> You are editing an existing company listing.</span>
                    <button id="cancelEditBtn">Cancel Edit</button>
                </div>

                <h3 id="formTitle" style="margin-bottom: 25px; color: var(--primary-dark);">Create a New Listing</h3>
                
                <form id="postAdForm">
                    <div class="form-full input-group">
                        <label>Main Image</label>
                        
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;" id="uploadOptions">
                            <button type="button" id="uploadBtnTrigger" class="btn btn-primary" style="flex: 1;"><i class="fa-solid fa-upload"></i> Upload New</button>
                            <button type="button" id="browseDriveBtn" class="btn btn-outline" style="flex: 1;"><i class="fa-brands fa-google-drive"></i> Browse Drive</button>
                        </div>
                        
                        <input type="file" id="propImage" accept="image/*" style="display: none;">
                        
                        <div id="imagePreviewContainer" style="display: none; position: relative;">
                            <img id="imagePreview" src="" alt="Preview" style="width: 100%; height: 350px; object-fit: cover; border-radius: 16px;">
                            <button type="button" id="removeImageBtn" style="position: absolute; top: 15px; right: 15px; background: #ef4444; color: white; border: none; padding: 10px 15px; font-weight: 600; border-radius: 8px; cursor: pointer;"><i class="fa-solid fa-trash"></i> Remove Image</button>
                        </div>
                    </div>

                    <div class="form-full input-group">
                        <label>Listing Title</label>
                        <input type="text" id="propTitle" class="custom-input" placeholder="e.g. Modern Twinhouse in New Cairo" required>
                    </div>

                    <div class="form-grid">
                        <div class="input-group"><label>Transaction Type</label><select id="propType" class="custom-input" required><option value="Sale">For Sale</option><option value="Rent">For Rent</option></select></div>
                        <div class="input-group"><label>Price (EGP)</label><input type="number" id="propPrice" class="custom-input" placeholder="5000000" required></div>
                        <div class="input-group"><label>City / Location</label><select id="propLocation" class="custom-input" required>
                            <option value="6th of October">6th of October</option>
                            <option value="Sheikh Zayed">Sheikh Zayed</option>
                            <option value="New Cairo">New Cairo</option>
                            <option value="North Coast">North Coast</option>
                            <option value="New Capital">New Capital</option>
                        </select></div>
                        <div class="input-group"><label>Total Area (m²)</label><input type="number" id="propArea" class="custom-input" placeholder="200" required></div>
                        <div class="input-group"><label>Bedrooms</label><input type="number" id="propBeds" class="custom-input" placeholder="3" required></div>
                        <div class="input-group"><label>Bathrooms</label><input type="number" id="propBaths" class="custom-input" placeholder="2" required></div>
                    </div>

                    <div class="form-full input-group" style="margin-top: 20px;">
                        <label><i class="fa-solid fa-map-pin" style="color: var(--primary);"></i> Pin on Map</label>
                        <div id="formMap" style="height: 300px; border-radius: 12px; border: 1px solid var(--border); z-index: 1;"></div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%; padding: 16px; margin-top: 20px; font-size: 1.1rem;">
                        Publish Listing <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>
                    </button>
                </form>
            </div>

            <div>
                <h3 style="margin-bottom: 15px; color: var(--text-dark);">Active Catalog</h3>
                <div class="prop-grid" id="myPropertiesGrid">Loading properties...</div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { auth, db } from "./almas.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, collection, query, getDocs, addDoc, updateDoc, deleteDoc, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        
        // --- API CONSTANTS ---
        const GOOGLE_SCRIPT_URL = "PASTE_YOUR_WEB_APP_URL_HERE"; 
        const DRIVE_API_KEY = "AIzaSyAw9VHVW8xRHM4bam_mr_XOM2rW3SeclHQ"; 
        const DRIVE_FOLDER_ID = "1uchldJE0NtACac2gN52_GFVLnhHNcSUv"; 

        document.addEventListener("DOMContentLoaded", () => {
            function showToast(m, t='success'){ const tst=document.createElement('div'); tst.className='toast'; tst.innerHTML=`<i class="fa-solid fa-circle-check" style="color:var(--primary);"></i> <span>${m}</span>`; document.getElementById('toastContainer').appendChild(tst); setTimeout(()=>tst.remove(), 3000); }

            // AUTH CHECK
            onAuthStateChanged(auth, async (user) => {
                if (!user) return window.location.href = "almas-login.html";
                const userDoc = await getDoc(doc(db, "users", user.uid));
                const role = userDoc.data().role;
                if (role !== 'admin' && role !== 'employee') return window.location.href = "index.html";
                document.getElementById('dashUserName').innerText = userDoc.data().fullName;
                if (role === 'admin') document.getElementById('navTeamBtn').style.display = 'flex';
                fetchAllProperties();
            });

            document.getElementById('dashLogoutBtn').onclick = () => signOut(auth).then(()=>window.location.href="almas-login.html");

            // --- UI & MAP LOGIC ---
            const formCard = document.getElementById('propertyFormCard');
            const toggleBtn = document.getElementById('toggleFormBtn');
            let map, marker, selectedLat = null, selectedLng = null;
            let editingPropertyId = null; 
            let existingImageUrl = null;

            function initMap() {
                if(!map) {
                    map = L.map('formMap').setView([30.0444, 31.2357], 10);
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                    map.on('click', (e) => { if (marker) map.removeLayer(marker); marker = L.marker(e.latlng).addTo(map); selectedLat = e.latlng.lat; selectedLng = e.latlng.lng; });
                } else { setTimeout(() => map.invalidateSize(), 300); }
            }

            toggleBtn.onclick = () => {
                formCard.style.display = formCard.style.display === 'none' ? 'block' : 'none';
                if(formCard.style.display === 'block') { initMap(); formCard.scrollIntoView({behavior: "smooth"}); }
            };

            // --- FETCH & EDIT PROPERTIES ---
            async function fetchAllProperties() {
                const grid = document.getElementById('myPropertiesGrid');
                const q = query(collection(db, "properties"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                grid.innerHTML = snap.empty ? '<p style="grid-column: 1/-1; text-align: center;">No properties found.</p>' : '';
                
                snap.forEach(docSnap => {
                    const data = docSnap.data(), id = docSnap.id, img = data.imageUrl || 'images/back.jpg';
                    const badgeClass = data.type === 'Sale' ? 'badge-sale' : 'badge-rent';

                    grid.innerHTML += `
                        <div class="prop-card">
                            <img src="${img}" onerror="this.src='https://via.placeholder.com/400x300?text=Image+Blocked+by+Google'">
                            <div class="prop-card-body">
                                <div><span class="prop-badge ${badgeClass}">For ${data.type}</span></div>
                                <h4 class="prop-title">${data.title}</h4>
                                <div class="prop-price">${data.price.toLocaleString()} EGP</div>
                                <div class="prop-card-actions">
                                    <button class="btn btn-outline btn-small btn-edit" data-id="${id}" data-json='${JSON.stringify(data).replace(/'/g, "&apos;")}'><i class="fa-solid fa-pen"></i> Edit</button>
                                    <button class="btn btn-danger btn-small btn-delete" data-id="${id}"><i class="fa-solid fa-trash"></i> Delete</button>
                                </div>
                            </div>
                        </div>`;
                });

                // Attach Edit Logic
                document.querySelectorAll('.btn-edit').forEach(b => b.onclick = function() {
                    const data = JSON.parse(this.getAttribute('data-json')); 
                    editingPropertyId = this.getAttribute('data-id'); 
                    existingImageUrl = data.imageUrl;

                    document.getElementById('propTitle').value = data.title || '';
                    document.getElementById('propType').value = data.type || 'Sale';
                    document.getElementById('propPrice').value = data.price || '';
                    document.getElementById('propLocation').value = data.location || '';
                    document.getElementById('propArea').value = data.area || '';
                    document.getElementById('propBeds').value = data.bedrooms || '';
                    document.getElementById('propBaths').value = data.bathrooms || '';

                    if (existingImageUrl) {
                        document.getElementById('imagePreview').src = existingImageUrl;
                        showPreview();
                    } else {
                        document.getElementById('removeImageBtn').click(); 
                    }

                    document.getElementById('formTitle').innerText = "Edit Company Listing"; 
                    document.getElementById('submitBtn').innerHTML = 'Update Listing <i class="fa-solid fa-check" style="margin-left: 8px;"></i>'; 
                    document.getElementById('editModeBanner').style.display = 'flex';
                    
                    formCard.style.display = 'block';
                    initMap();
                    if(data.lat && data.lng) { 
                        selectedLat = data.lat; selectedLng = data.lng; 
                        if(marker) map.removeLayer(marker); 
                        marker = L.marker([data.lat, data.lng]).addTo(map); 
                        map.setView([data.lat, data.lng], 15); 
                    }
                    formCard.scrollIntoView({behavior: "smooth", block: "start"});
                });

                // Attach Delete Logic
                document.querySelectorAll('.btn-delete').forEach(b => b.onclick = async function() { 
                    if(confirm("Delete this listing?")) { await deleteDoc(doc(db, "properties", this.getAttribute('data-id'))); fetchAllProperties(); }
                });
            }

            // --- IMAGE SELECTION (Upload vs Browse) ---
            const fileInput = document.getElementById('propImage');
            const previewImg = document.getElementById('imagePreview');
            const previewCont = document.getElementById('imagePreviewContainer');
            const uploadOptions = document.getElementById('uploadOptions');
            let selectedFile = null;

            // Option 1: Upload New File
            document.getElementById('uploadBtnTrigger').onclick = () => fileInput.click();
            fileInput.onchange = (e) => { 
                if (e.target.files[0]) { 
                    selectedFile = e.target.files[0]; 
                    existingImageUrl = null;
                    const r = new FileReader(); 
                    r.onload = (ev) => { previewImg.src = ev.target.result; showPreview(); }; 
                    r.readAsDataURL(selectedFile);
                }
            };

            // Option 2: Browse Google Drive
            const driveModal = document.getElementById('driveModal');
            document.getElementById('browseDriveBtn').onclick = () => {
                driveModal.classList.add('active');
                fetchDriveFiles();
            };
            document.getElementById('closeDriveModal').onclick = () => driveModal.classList.remove('active');

            function fetchDriveFiles() {
                const endpoint = `https://www.googleapis.com/drive/v3/files?q='${DRIVE_FOLDER_ID}'+in+parents&fields=files(id,name,mimeType)&key=${DRIVE_API_KEY}`;
                
                fetch(endpoint)
                    .then(res => res.json())
                    .then(data => {
                        const grid = document.getElementById('driveGrid');
                        grid.innerHTML = '';
                        
                        const imageFiles = data.files ? data.files.filter(f => f.mimeType.startsWith('image/')) : [];
                        
                        if(imageFiles.length > 0) {
                            imageFiles.forEach(file => {
                                // THE FIX: Using the secret thumbnail endpoint that avoids hotlink blocks!
                                const safeHotlinkUrl = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
                                
                                const img = document.createElement('img');
                                img.src = safeHotlinkUrl;
                                img.className = 'drive-img-item';
                                
                                // ERROR CATCHER: If Google STILL blocks it, show exactly why
                                img.onerror = function() {
                                    this.onerror = null; 
                                    this.src = 'https://via.placeholder.com/150x120/ffcccc/ff0000?text=Make+Public';
                                    console.error("Google blocked this image. Check the sharing settings of the specific file in Google Drive.");
                                };

                                img.onclick = () => {
                                    // Prevent selecting a broken image
                                    if(img.src.includes('via.placeholder.com')) {
                                        alert("You cannot select a broken image. Please go to Google Drive and ensure this specific image file is set to 'Anyone with the link can view'.");
                                        return;
                                    }

                                    selectedFile = null; 
                                    existingImageUrl = safeHotlinkUrl; 
                                    previewImg.src = safeHotlinkUrl;
                                    showPreview();
                                    driveModal.classList.remove('active');
                                };
                                grid.appendChild(img);
                            });
                        } else {
                            grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center;">No images found. Ensure folder is public!</p>';
                        }
                    })
                    .catch(err => {
                        console.error('Drive Error:', err);
                        document.getElementById('driveGrid').innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: red;">Failed to load images. Please check your folder sharing permissions.</p>';
                    });
            }

            function showPreview() {
                uploadOptions.style.display = 'none';
                previewCont.style.display = 'block';
            }

            document.getElementById('removeImageBtn').onclick = () => { 
                selectedFile = null; 
                existingImageUrl = null;
                fileInput.value = ''; 
                uploadOptions.style.display = 'flex'; 
                previewCont.style.display = 'none'; 
            };
            
            // Cancel Edit
            document.getElementById('cancelEditBtn').onclick = () => { 
                document.getElementById('postAdForm').reset(); 
                document.getElementById('removeImageBtn').click(); 
                editingPropertyId = null; 
                document.getElementById('formTitle').innerText = "Create a New Listing"; 
                document.getElementById('submitBtn').innerHTML = 'Publish Listing <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i>';
                document.getElementById('editModeBanner').style.display = 'none'; 
                formCard.style.display = 'none';
            };

            // --- FORM SUBMISSION LOGIC ---
            document.getElementById('postAdForm').onsubmit = async (e) => {
                e.preventDefault(); 
                const btn = document.getElementById('submitBtn'); 
                btn.disabled = true; 
                btn.innerHTML = 'Saving... <i class="fa-solid fa-spinner fa-spin"></i>';
                
                try {
                    let finalImage = existingImageUrl;

                    if (selectedFile) {
                        const base64Data = await new Promise((res) => {
                            const r = new FileReader();
                            r.onload = () => res(r.result.split(',')[1]); 
                            r.readAsDataURL(selectedFile);
                        });

                        const response = await fetch(GOOGLE_SCRIPT_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify({ filename: selectedFile.name, mimeType: selectedFile.type, base64: base64Data }),
                            redirect: "follow"
                        });
                        const result = await response.json();
                        if (result.status === 'success') finalImage = result.url;
                        else throw new Error("Drive Upload Failed");
                    }

                    const propData = { 
                        title: document.getElementById('propTitle').value, 
                        type: document.getElementById('propType').value, 
                        price: Number(document.getElementById('propPrice').value), 
                        location: document.getElementById('propLocation').value, 
                        area: Number(document.getElementById('propArea').value), 
                        bedrooms: Number(document.getElementById('propBeds').value), 
                        bathrooms: Number(document.getElementById('propBaths').value), 
                        imageUrl: finalImage,
                        lat: selectedLat, 
                        lng: selectedLng
                    };

                    if (editingPropertyId) {
                        await updateDoc(doc(db, "properties", editingPropertyId), propData);
                        showToast("Listing Updated Successfully!");
                    } else {
                        propData.createdAt = serverTimestamp();
                        await addDoc(collection(db, "properties"), propData); 
                        showToast("Listing Published Successfully!");
                    }
                    
                    document.getElementById('cancelEditBtn').click();
                    fetchAllProperties();

                } catch(err) { 
                    console.error(err); 
                    showToast("Error publishing listing.", "error"); 
                } finally {
                    btn.disabled = false; 
                    btn.innerHTML = 'Publish Listing <i class=\"fa-solid fa-arrow-right\" style=\"margin-left: 8px;\"></i>';
                }
            };
        });
    </script>
</body>
</html>
