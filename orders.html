<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders - Nutra Egypt</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Base Layout */
        html, body { width: 100%; max-width: 100%; overflow-x: hidden; }
        .profile-container { padding-top: 40px; padding-bottom: 80px; }
        .profile-layout { display: grid; grid-template-columns: 280px 1fr; gap: 30px; align-items: start; }
        
        /* Sidebar Styling (Matches profile.html) */
        .profile-sidebar { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; position: sticky; top: 100px; z-index: 10; }
        .user-mini-card { padding: 30px 20px; text-align: center; border-bottom: 1px solid var(--border); background: linear-gradient(to bottom, #f0fdf4, #ffffff); }
        .user-avatar-large { width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 15px; border: 3px solid var(--white); box-shadow: 0 4px 10px rgba(0,0,0,0.1); overflow: hidden; }
        .user-avatar-large img { width: 100%; height: 100%; object-fit: cover; }
        .user-name { font-weight: 700; font-size: 1.1rem; color: var(--text-dark); margin-bottom: 4px; }
        .user-email { color: var(--text-gray); font-size: 0.85rem; }
        .profile-nav { padding: 10px; }
        .profile-link { display: flex; align-items: center; gap: 12px; padding: 12px 15px; color: var(--text-gray); border-radius: 8px; font-weight: 500; font-size: 0.95rem; transition: 0.2s; cursor: pointer; text-decoration: none; }
        .profile-link:hover { background: #f9fafb; color: var(--text-dark); }
        .profile-link.active { background: var(--primary-light); color: var(--primary-dark); font-weight: 600; }
        
        /* Order Page Specifics */
        .page-title h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 5px; }
        .page-title p { color: var(--text-gray); font-size: 0.95rem; }
        
        .filters-row { display: flex; gap: 10px; margin-bottom: 25px; overflow-x: auto; padding-bottom: 5px; }
        .filter-chip { padding: 8px 16px; border-radius: 99px; border: 1px solid var(--border); background: var(--white); font-size: 0.85rem; font-weight: 600; cursor: pointer; color: var(--text-gray); white-space: nowrap; transition: 0.2s; }
        .filter-chip.active { background: var(--text-dark); color: white; border-color: var(--text-dark); }
        .filter-chip:hover:not(.active) { background: #f3f4f6; }

        .orders-list { display: flex; flex-direction: column; gap: 20px; }
        
        .order-card { background: var(--white); border: 1px solid var(--border); border-radius: 16px; padding: 25px; transition: 0.3s; position: relative; }
        .order-card:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-color: #d1d5db; }
        
        .order-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #f3f4f6; flex-wrap: wrap; gap: 10px; }
        .order-id { font-weight: 700; font-size: 1.1rem; color: var(--text-dark); }
        .order-date { font-size: 0.85rem; color: var(--text-gray); display: flex; align-items: center; gap: 6px; }
        
        .status-badge { padding: 6px 12px; border-radius: 99px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-processing { background: #fff7ed; color: #c2410c; }
        .status-delivered { background: #dcfce7; color: #166534; }
        .status-cancelled { background: #fef2f2; color: #991b1b; }

        .order-preview { display: flex; gap: 15px; margin-bottom: 20px; }
        .preview-img { width: 70px; height: 70px; border-radius: 8px; background: #f9fafb; border: 1px solid #f3f4f6; padding: 5px; display: flex; align-items: center; justify-content: center; }
        .preview-img img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .order-meta { display: flex; justify-content: space-between; align-items: center; }
        .order-total { font-size: 0.9rem; color: var(--text-gray); }
        .total-amount { font-size: 1.2rem; font-weight: 800; color: var(--text-dark); margin-left: 5px; }
        
        .order-actions { display: flex; gap: 10px; }
        .btn-track { padding: 8px 20px; border-radius: 8px; font-size: 0.9rem; background: var(--primary); color: white; border: none; cursor: pointer; font-weight: 600; }
        .btn-details { padding: 8px 20px; border-radius: 8px; font-size: 0.9rem; background: transparent; border: 1px solid var(--border); cursor: pointer; font-weight: 600; }

        @media (max-width: 900px) {
            .profile-layout { grid-template-columns: 1fr; }
            .profile-sidebar { position: static; margin-bottom: 20px; }
            .user-mini-card { display: flex; align-items: center; text-align: left; gap: 20px; padding: 20px; }
            .user-avatar-large { margin: 0; width: 60px; height: 60px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="container navbar">
            <a href="index.html" class="logo"><i class="fa-brands fa-gripfire"></i><span>NUTRA EGYPT</span></a>
            <div class="nav-actions">
                <div id="auth-state"></div>
                <span style="color: #e5e7eb;">|</span>
                <a href="cart.html" class="nav-link"><i class="fa-solid fa-cart-shopping"></i></a>
                <a href="profile.html" class="nav-link"><i class="fa-regular fa-circle-user"></i></a>
            </div>
        </div>
    </header>

    <div class="container profile-container">
        
        <div class="cart-breadcrumbs" style="margin-bottom: 20px;">
            <a href="index.html">Home</a> 
            <i class="fa-solid fa-chevron-right" style="font-size: 0.7rem;"></i>
            <a href="profile.html">Dashboard</a>
            <i class="fa-solid fa-chevron-right" style="font-size: 0.7rem;"></i>
            <span class="breadcrumb-active">My Orders</span>
        </div>

        <div class="profile-layout">
            
            <aside class="profile-sidebar">
                <div class="user-mini-card">
                    <div class="user-avatar-large">
                        <img id="sidebar-avatar" src="https://ui-avatars.com/api/?name=User" alt="User">
                    </div>
                    <div>
                        <div id="sidebar-name" class="user-name">Loading...</div>
                        <div id="sidebar-email" class="user-email">...</div>
                    </div>
                </div>
                <div class="profile-nav">
                    <a href="profile.html" class="profile-link"><i class="fa-solid fa-chart-pie"></i> Overview</a>
                    <a href="order.html" class="profile-link active"><i class="fa-solid fa-box-open"></i> My Orders</a>
                    <a href="account.html" class="profile-link"><i class="fa-solid fa-gear"></i> Account Settings</a>
                    <a href="#" class="profile-link"><i class="fa-regular fa-credit-card"></i> Payment Methods</a>
                </div>
            </aside>

            <main>
                <div class="settings-header">
                    <div class="page-title">
                        <h2>Order History</h2>
                        <p>Track your past shipments and current orders.</p>
                    </div>
                </div>

                <div class="filters-row">
                    <button class="filter-chip active">All Orders</button>
                    <button class="filter-chip">Processing</button>
                    <button class="filter-chip">Shipped</button>
                    <button class="filter-chip">Delivered</button>
                </div>

                <div class="orders-list" id="orders-container">
                    <p style="text-align:center; padding: 40px; color: var(--text-gray);">Loading orders...</p>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="script.js"></script>
    <script type="module" src="orders.js"></script>
</body>
</html>
