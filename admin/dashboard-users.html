<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users | ALMAS Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="dashboard.css">
    <style>
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: white; padding: 30px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area"><div><img src="images/almas.png" alt="Logo"> ALMAS</div></div>
        <div class="admin-profile">
            <i class="fa-solid fa-shield-halved" id="roleIcon"></i>
            <h4 id="dashUserName">Loading...</h4>
            <p id="dashUserRole">Company Portal</p>
        </div>
        <div class="nav-links">
            <a href="dashboard.html" class="nav-btn"><i class="fa-solid fa-chart-pie"></i> Overview</a>
            <a href="dashboard-properties.html" class="nav-btn"><i class="fa-solid fa-building"></i> Catalog & Ads</a>
            <a href="dashboard-messages.html" class="nav-btn"><i class="fa-solid fa-envelope"></i> Customer Inbox</a>
            <a href="dashboard-users.html" class="nav-btn active"><i class="fa-solid fa-users"></i> Manage Users</a>
            <a href="dashboard-team.html" class="nav-btn" id="navTeamBtn" style="display: none;"><i class="fa-solid fa-user-shield"></i> Manage Team</a>
        </div>
        <button class="logout-btn" id="dashLogoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> Log Out</button>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h2 class="page-title">Registered Customers</h2>
        </header>

        <div class="content-body">
            <div class="glass-card">
                <h3 style="margin-bottom: 15px;">Customer Database</h3>
                <table class="team-table">
                    <thead>
                        <tr id="tableHeaderRow">
                            <th>Full Name</th>
                            <th>Email Address</th>
                            <th>Role Status</th>
                            <th>Contact</th>
                            </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr><td colspan="5" style="text-align: center;"><i class="fa-solid fa-spinner fa-spin"></i> Loading users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div class="modal-overlay" id="editCustomerModal">
        <div class="modal-card">
            <h3 style="margin-bottom: 20px; color: var(--primary-dark);">Edit Customer</h3>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="editCustomerName" class="custom-input">
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" id="editCustomerPhone" class="custom-input">
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn btn-outline" id="closeCustomerModal" style="flex: 1;">Cancel</button>
                <button class="btn btn-primary" id="saveCustomerBtn" style="flex: 1;">Save Changes</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from "./almas.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, updateDoc, deleteDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.addEventListener("DOMContentLoaded", () => {
            let currentUserRole = null;
            
            onAuthStateChanged(auth, async (user) => {
                if (!user) return window.location.href = "almas-login.html";
                const userDoc = await getDoc(doc(db, "users", user.uid));
                currentUserRole = userDoc.data().role;
                
                if (currentUserRole !== 'admin' && currentUserRole !== 'employee') return window.location.href = "index.html";

                document.getElementById('dashUserName').innerText = userDoc.data().fullName;
                if (currentUserRole === 'admin') {
                    document.getElementById('dashUserRole').innerText = "Administrator";
                    document.getElementById('navTeamBtn').style.display = 'flex';
                    // Inject Actions column header for Admins
                    document.getElementById('tableHeaderRow').innerHTML += '<th>Actions</th>';
                } else {
                    document.getElementById('dashUserRole').innerText = "Employee Portal";
                    document.getElementById('roleIcon').className = "fa-solid fa-user-tie";
                }

                loadCustomers();
            });

            document.getElementById('dashLogoutBtn').onclick = () => signOut(auth).then(()=>window.location.href="almas-login.html");

            // Modal Logic
            let editingCustomerId = null;
            const editModal = document.getElementById('editCustomerModal');
            document.getElementById('closeCustomerModal').onclick = () => editModal.classList.remove('active');

            async function loadCustomers() {
                const tBody = document.getElementById('usersTableBody');
                // Fetch normal users
                const q = query(collection(db, "users"), where("role", "==", "user"));
                const snap = await getDocs(q);
                
                tBody.innerHTML = snap.empty ? '<tr><td colspan="5" style="text-align: center;">No customers found.</td></tr>' : '';
                
                snap.forEach(docSnap => {
                    const data = docSnap.data();
                    const phone = data.phone || 'N/A';
                    
                    let actionHtml = '';
                    if (currentUserRole === 'admin') {
                        actionHtml = `
                            <td>
                                <div style="display:flex; gap: 8px;">
                                    <button class="btn btn-outline edit-user-btn" style="padding: 6px 12px; font-size: 0.8rem;" data-id="${docSnap.id}" data-name="${data.fullName}" data-phone="${data.phone || ''}"><i class="fa-solid fa-pen"></i></button>
                                    <button class="btn btn-danger delete-user-btn" style="padding: 6px 12px; font-size: 0.8rem;" data-id="${docSnap.id}"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </td>
                        `;
                    }

                    tBody.innerHTML += `
                        <tr>
                            <td style="font-weight: 700; color: var(--text-dark);"><i class="fa-solid fa-user" style="color: var(--text-gray); margin-right: 8px;"></i> ${data.fullName || "Unknown User"}</td>
                            <td>${data.email}</td>
                            <td><span class="role-badge role-user">Customer</span></td>
                            <td style="color: var(--text-gray);"><i class="fa-solid fa-phone"></i> ${phone}</td>
                            ${actionHtml}
                        </tr>
                    `;
                });

                // Attach Admin Handlers
                if (currentUserRole === 'admin') {
                    document.querySelectorAll('.edit-user-btn').forEach(btn => {
                        btn.onclick = () => {
                            editingCustomerId = btn.getAttribute('data-id');
                            document.getElementById('editCustomerName').value = btn.getAttribute('data-name');
                            document.getElementById('editCustomerPhone').value = btn.getAttribute('data-phone');
                            editModal.classList.add('active');
                        };
                    });
// ... inside the delete-user-btn click handler in dashboard-users.html

// document.querySelectorAll('.delete-user-btn').forEach(btn => {
//     btn.onclick = async () => {
//         const targetUid = btn.getAttribute('data-id');
        
//         if(confirm("Permanently delete this customer? This will remove their profile, saved properties, and messages.")) {
//             btn.disabled = true;
//             btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Cleaning...';

//             try {
//                 // 1. Delete their Saved Properties subcollection
//                 const savedSnap = await getDocs(collection(db, "users", targetUid, "savedProperties"));
//                 const savedDeletes = savedSnap.docs.map(d => deleteDoc(doc(db, "users", targetUid, "savedProperties", d.id)));
//                 await Promise.all(savedDeletes);

//                 // 2. Find and Delete their Chats
//                 const chatQuery = query(collection(db, "chats"), where("buyerId", "==", targetUid));
//                 const chatSnap = await getDocs(chatQuery);
//                 const chatDeletes = chatSnap.docs.map(d => deleteDoc(doc(db, "chats", d.id)));
//                 await Promise.all(chatDeletes);

//                 // 3. Delete the Main Profile
//                 await deleteDoc(doc(db, "users", targetUid));

//                 alert("Customer and all related data removed.");
//                 loadCustomers(); 
//             } catch(e) {
//                 console.error(e);
//                 alert("Wipeout failed. Check console.");
//             }
//         }
//     }
// });

                    // document.querySelectorAll('.delete-user-btn').forEach(btn => {
                    //     btn.onclick = async () => {
                    //         if(confirm("Are you sure you want to delete this customer profile?")) {
                    //             btn.disabled = true;
                    //             btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
                    //             try {
                    //                 await deleteDoc(doc(db, "users", btn.getAttribute('data-id')));
                    //                 loadCustomers(); 
                    //             } catch(e) {
                    //                 console.error(e);
                    //                 alert("Failed to delete user.");
                    //             }
                    //         }
                    //     }
                    // });
                }
            }

            // Save Edited Customer
            document.getElementById('saveCustomerBtn').onclick = async () => {
                if(!editingCustomerId) return;
                const newName = document.getElementById('editCustomerName').value.trim();
                const newPhone = document.getElementById('editCustomerPhone').value.trim();
                const btn = document.getElementById('saveCustomerBtn');
                btn.innerHTML = "Saving..."; btn.disabled = true;

                try {
                    await updateDoc(doc(db, "users", editingCustomerId), {
                        fullName: newName,
                        phone: newPhone
                    });
                    editModal.classList.remove('active');
                    loadCustomers();
                } catch(e) {
                    console.error(e);
                    alert("Failed to update customer.");
                } finally {
                    btn.innerHTML = "Save Changes"; btn.disabled = false;
                }
            };
        });
    </script>
</body>
</html>
