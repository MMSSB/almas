<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Login | ALMAS</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=2000&q=80') no-repeat center center/cover;
            position: relative;
            margin: 0;
            overflow: hidden;
        }

        .bg-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            position: relative;
            z-index: 2;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: fadeUp 0.5s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-header {
            text-align: center;
            margin-bottom: 30px;
  display: grid;
  place-items: center;
        }

        .auth-header img {
            width: 55px;
            margin-bottom: 15px;
        }

        .auth-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary-dark);
        }

        .auth-header p {
            color: var(--text-gray);
            font-size: 0.95rem;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 16px;
            transition: 0.3s;
        }

        .input-wrapper:focus-within {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        .input-wrapper i {
            color: var(--text-gray);
            font-size: 1.2rem;
            margin-right: 12px;
        }

        .input-wrapper input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 1rem;
            color: var(--text-dark);
            font-family: inherit;
        }

        .auth-btn {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .auth-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(14, 165, 233, 0.2);
        }

        .auth-btn:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .error-message {
            color: #ef4444;
            background: #fef2f2;
            border: 1px solid #fca5a5;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            text-align: center;
        }

        .back-home {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            z-index: 10;
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 99px;
            backdrop-filter: blur(4px);
            transition: 0.3s;
        }

        .back-home:hover {
            background: rgba(255,255,255,0.2);
        }

        @media (max-width: 480px) {
            .auth-card {
                margin: 20px;
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div id="almas-loader" class="almas-loader-overlay">
        <div class="loader-content">
            <div class="spinner-ring"></div>
            <img src="images/almas.png" alt="ALMAS Logo" class="loader-logo">
        </div>
        <h3 class="loader-text">Loading ALMAS...</h3>
    </div>
    <a href="index.html" class="back-home"><i class="ph ph-arrow-left"></i> Back to Home</a>
    <div class="bg-overlay"></div>

    <div class="auth-card">
        <div class="auth-header">
            <img src="images/almas.png" alt="ALMAS Logo">
            <h2>Staff Login</h2>
            <p>Access the ALMAS Company Dashboard.</p>
        </div>

        <div id="authError" class="error-message"></div>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <div class="input-wrapper">
                    <i class="ph ph-envelope-simple"></i>
                    <input type="email" id="loginEmail" placeholder="you@almas.com" required>
                </div>
            </div>
            <div class="input-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label style="margin-bottom: 0;">Password</label>
                </div>
                <div class="input-wrapper" style="margin-top: 8px;">
                    <i class="ph ph-lock-key"></i>
                    <input type="password" id="loginPassword" placeholder="••••••••" required>
                </div>
            </div>
            <button type="submit" class="auth-btn" id="loginBtn">Sign In <i class="ph ph-sign-in"></i></button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from "./almas.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        document.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById('loginForm');
            const errorBox = document.getElementById('authError');
            const loginBtn = document.getElementById('loginBtn');

            const showError = (message) => {
                errorBox.innerText = message;
                errorBox.style.display = 'block';
            };

            // Smart Redirect Function
            const handleRedirect = async (uid) => {
                try {
                    const userDoc = await getDoc(doc(db, "users", uid));
                    if (userDoc.exists()) {
                        const role = userDoc.data().role;
                        if (role === 'admin' || role === 'employee') {
                            window.location.href = "dashboard.html"; // Redirect Company Staff
                        } else {
                            window.location.href = "index.html"; // Redirect Normal Users
                        }
                    } else {
                        window.location.href = "index.html"; // Fallback
                    }
                } catch (error) {
                    console.error("Redirect Error:", error);
                    window.location.href = "index.html";
                }
            };

            // LOGIN LOGIC
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorBox.style.display = 'none';
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Authenticating...';

                const email = document.getElementById('loginEmail').value.trim();
                const password = document.getElementById('loginPassword').value;

                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    await handleRedirect(userCredential.user.uid);
                } catch (error) {
                    console.error(error);
                    showError("Invalid email or password. Please try again.");
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Secure Sign In <i class="ph ph-sign-in"></i>';
                }
            });
        });
    </script>
</body>
</html>
